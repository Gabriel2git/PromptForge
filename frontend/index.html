<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PF PromptForge</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <div class="app-shell" id="appShell">
    <header class="topbar panel">
      <div class="brand">
        <div class="brand-logo">PF</div>
        <div>
          <div class="brand-title">PromptForge</div>
          <div class="brand-sub">AI 时代的需求澄清引导</div>
        </div>
      </div>

      <div class="top-actions">
        <button id="newConversationBtn" class="btn ghost">+ 新对话</button>
        <button id="toggleHistoryBtn" class="btn primary">历史</button>
        <button id="openSettingsBtn" class="btn icon" aria-label="设置">⚙</button>
      </div>
    </header>

    <div class="mobile-tabs panel" id="mobileTabs">
      <button class="mobile-tab active" data-pane="history">历史</button>
      <button class="mobile-tab" data-pane="chat">对话</button>
      <button class="mobile-tab" data-pane="prompt">Prompt</button>
    </div>

    <div class="workspace" id="workspace">
      <aside class="history-pane panel" id="historyPane">
        <div class="pane-title">历史记录</div>
        <ul id="historyList" class="history-list"></ul>
      </aside>

      <main class="chat-pane panel" id="chatPane">
        <div class="pane-title">澄清引导</div>

        <div class="framework-grid" id="frameworkGrid">
          <button class="framework-card active" data-framework="standard">
            <div class="framework-name">Standard</div>
            <div class="framework-desc">角色/任务/约束/输出</div>
          </button>
          <button class="framework-card" data-framework="langgpt">
            <div class="framework-name">LangGPT</div>
            <div class="framework-desc">Role/Skills/Rules/Workflow</div>
          </button>
          <button class="framework-card" data-framework="co-star">
            <div class="framework-name">CO-STAR</div>
            <div class="framework-desc">Context/Objective/Style/Audience</div>
          </button>
          <button class="framework-card" data-framework="xml">
            <div class="framework-name">XML</div>
            <div class="framework-desc">标签化结构输出</div>
          </button>
        </div>

        <div class="config-row panel-soft">
          <div class="config-group">
            <label for="modeSelect">模式</label>
            <select id="modeSelect">
              <option value="auto">Auto</option>
              <option value="manual">Manual</option>
            </select>
          </div>
          <div class="config-group">
            <label for="scenarioSelect">场景</label>
            <select id="scenarioSelect">
              <option value="auto">Auto</option>
            </select>
          </div>
          <div class="config-group">
            <label for="personalitySelect">人设</label>
            <select id="personalitySelect">
              <option value="">Auto</option>
            </select>
          </div>
          <div class="config-group">
            <label for="templateSelect">输出协议</label>
            <select id="templateSelect">
              <option value="standard">Standard</option>
            </select>
          </div>
          <div class="config-group verbosity-group">
            <label for="verbosityInput">详细度 <span id="verbosityValue">5</span></label>
            <input id="verbosityInput" type="range" min="1" max="10" value="5" />
          </div>
        </div>

        <div id="resolvedConfigLabel" class="resolved-config">等待创建会话后显示最终配置</div>

        <div id="chatBox" class="chat-box"></div>

        <div class="progress-row">
          <span id="progressLabel">进度 0/0</span>
        </div>

        <div class="composer">
          <textarea id="answerInput" rows="2" placeholder="告诉我你想让 AI 做什么，回车发送，Shift+回车换行..."></textarea>
          <div class="composer-actions">
            <button id="sendBtn" class="btn primary">发送</button>
            <button id="forceBtn" class="btn">直接生成</button>
          </div>
        </div>
      </main>

      <section class="prompt-pane panel" id="promptPane">
        <div class="pane-title">Prompt 输出</div>

        <div class="prompt-view-tabs hidden" id="promptViewTabs">
          <button class="prompt-view-tab active" data-view="spec" type="button">结构化面板</button>
          <button class="prompt-view-tab" data-view="raw" type="button">Raw Text</button>
        </div>

        <div id="promptEmpty" class="prompt-empty">
          <div class="empty-icon">✦</div>
          <div>开始对话后，最终 Prompt 会显示在这里</div>
        </div>

        <div id="promptSpecPanel" class="prompt-spec-panel hidden">
          <div id="specCoverage" class="spec-coverage"></div>
          <div id="promptSpecGrid" class="prompt-spec-grid"></div>
        </div>

        <div id="promptRawPanel" class="prompt-raw-panel hidden">
          <pre id="promptReadonly" class="prompt-readonly"></pre>
          <textarea id="promptEditor" class="prompt-editor hidden" placeholder="在这里编辑最终 Prompt..."></textarea>
        </div>

        <div class="prompt-actions">
          <button id="editPromptBtn" class="btn">编辑</button>
          <button id="savePromptBtn" class="btn hidden">保存</button>
          <button id="copyPromptBtn" class="btn primary">复制</button>
        </div>
      </section>
    </div>
  </div>

  <div id="settingsModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="modal-card panel">
      <div class="modal-head">
        <h2 id="settingsTitle">设置</h2>
        <button id="closeSettingsBtn" class="btn icon" aria-label="关闭">✕</button>
      </div>

      <label class="field">
        <span>API Key</span>
        <input id="apiKeyInput" type="text" placeholder="输入你的 API Key" />
      </label>

      <label class="field">
        <span>Base URL</span>
        <input id="baseUrlInput" type="text" placeholder="https://api.deepseek.com" />
      </label>

      <label class="field">
        <span>模型名称</span>
        <input id="modelInput" type="text" placeholder="deepseek-chat" />
      </label>

      <label class="field">
        <span>最大对话轮次</span>
        <input id="maxTurnsInput" type="number" min="1" max="10" />
      </label>

      <label class="field">
        <span>默认框架</span>
        <select id="defaultFrameworkSelect">
          <option value="standard">Standard</option>
          <option value="langgpt">LangGPT</option>
          <option value="co-star">CO-STAR</option>
          <option value="xml">XML</option>
        </select>
      </label>

      <div class="modal-actions">
        <button id="cancelSettingsBtn" class="btn">取消</button>
        <button id="saveSettingsBtn" class="btn primary">保存</button>
      </div>
    </div>
  </div>

  <script src="/assets/app.js"></script>
</body>
</html>
